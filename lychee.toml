# lychee link-checker config — https://github.com/lycheeverse/lychee
# Auto-discovered as `lychee.toml` in the repo root by both the CLI and CI action.

# Be resilient to flaky external hosts.
max_retries = 3
retry_wait_time = 2
timeout = 20

# Treat rate-limiting as success rather than a broken link.
accept = ["200..=299", "429"]

# Placeholder links live in scaffolding, not real content.
exclude_path = ["templates", "tmp", ".git"]

# Skip mailto: and Obsidian-style [[wiki-links]] (not real URLs/paths).
exclude = ["^mailto:"]
